name: build-bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Build bundle
        run: npm run build

      - name: Fail if dist/ is dirty
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/ contains uncommitted changes after build. Run 'npm run build' locally and commit the result."
            git --no-pager diff dist/
            exit 1
          fi
